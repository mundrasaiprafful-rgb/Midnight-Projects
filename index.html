<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>For You</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  overflow: hidden;
  background: radial-gradient(circle at center, #0f0f1a, #000);
  color: white;
  text-align: center;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
}

.container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 90%;
  max-width: 500px;
  padding: 20px;
  display: none;
}

h1 {
  font-size: clamp(24px, 6vw, 40px);
  margin-bottom: 20px;
  opacity: 0;
  animation: fadeIn 1.5s forwards;
}

button {
  padding: 12px 24px;
  margin: 10px;
  font-size: clamp(16px, 4vw, 18px);
  border-radius: 30px;
  border: none;
  cursor: pointer;
  transition: all 0.3s ease;
}

.yes {
  background: #ff4d88;
  color: white;
}

.no {
  background: white;
  color: black;
  position: absolute;
}

button:hover {
  transform: scale(1.1);
}

@keyframes fadeIn {
  to { opacity: 1; }
}

.success {
  display: none;
  font-size: clamp(18px, 5vw, 24px);
  animation: fadeIn 1.5s forwards;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="container" id="valentine">
  <h1>Will you be my Valentine? 💫</h1>
  <button class="yes" onclick="yesClicked()">YES</button>
  <button class="no" id="noBtn">NO</button>
  <div class="success" id="successMsg">
    💖 You just agreed to:
    <br><br>
    Unlimited cuddles  
    <br>Bad puns forever  
    <br>Mutual pizza theft rights  
  </div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

let particles = [];
let stage = "adiyogi";
let startTime = Date.now();

class Particle {
  constructor(x, y) {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.tx = x;
    this.ty = y;
    this.size = 2;
  }
  update() {
    this.x += (this.tx - this.x) * 0.05;
    this.y += (this.ty - this.y) * 0.05;
  }
  draw() {
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
    ctx.fill();
  }
}

function createAdiyogi() {
  particles = [];
  for (let i = 0; i < 1200; i++) {
    let x = canvas.width/2 + Math.cos(i)*150*Math.sin(i/20);
    let y = canvas.height/2 + Math.sin(i)*120;
    particles.push(new Particle(x,y));
  }
}

function createHeart() {
  particles = [];
  for (let i = 0; i < 1200; i++) {
    let t = Math.random() * Math.PI * 2;
    let x = 16 * Math.pow(Math.sin(t), 3);
    let y = 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
    x *= 15;
    y *= -15;
    particles.push(new Particle(canvas.width/2 + x, canvas.height/2 + y));
  }
}

function dissolve() {
  particles.forEach(p => {
    p.tx = Math.random() * canvas.width;
    p.ty = Math.random() * canvas.height;
  });
}

function animate() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p => {
    p.update();
    p.draw();
  });

  let elapsed = Date.now() - startTime;

  if(stage==="adiyogi" && elapsed>5000){
    stage="heart";
    createHeart();
  }

  if(stage==="heart" && elapsed>8000){
    stage="dissolve";
    dissolve();
  }

  if(stage==="dissolve" && elapsed>11000){
    document.getElementById("valentine").style.display="block";
    stage="done";
  }

  requestAnimationFrame(animate);
}

createAdiyogi();
animate();

function yesClicked(){
  document.querySelector("h1").style.display="none";
  document.querySelector(".yes").style.display="none";
  document.querySelector(".no").style.display="none";
  document.getElementById("successMsg").style.display="block";
}

const noBtn = document.getElementById("noBtn");
let chaseStart = null;

function moveNo(){
  if(!chaseStart) chaseStart = Date.now();
  let elapsed = Date.now() - chaseStart;

  if(elapsed > 5000){
    noBtn.innerText = "Okay fine 😌";
    noBtn.onclick = null;
    noBtn.onmouseover = null;
    noBtn.ontouchstart = null;
    return;
  }

  let x = Math.random() * (window.innerWidth - 100);
  let y = Math.random() * (window.innerHeight - 50);
  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
}

noBtn.onmouseover = moveNo;
noBtn.ontouchstart = moveNo;

</script>

</body>
</html>
